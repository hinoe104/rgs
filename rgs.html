<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Russian Gypsy Solitaire</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>Russian Gypsy Solitaire</h1>
      <div class="controls">
        <button id="btn-reset">シャッフル</button>
        <button id="btn-finish">占いを読む</button>
      </div>
      <p class="hint">クリックでカード回転 — 隣り合うシンボルが一致すると光る</p>
    </header>
    <div id="grid-container">
      <div id="grid"></div>
    </div>
    <div id="result" hidden>
      <h2>確定シンボル</h2>
      <div id="result-content"></div>
      <button id="btn-close-result">閉じる</button>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
